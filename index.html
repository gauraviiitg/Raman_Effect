<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styled Blocks with Search Box</title>
<style>
  body {
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .container {
    text-align: center;
  }

  .search-box {
    width: 300px;
    padding: 10px;
    margin-bottom: 20px;
    font-size: 16px;
    border: none;
    border-radius: 20px;
    background-color: white;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
    outline: none;
  }

  .blocks-container {
    display: flex;
    justify-content: center;
  }

  .block {
    width: 200px;
    height: 200px;
    background-color: #444;
    color: white;
    text-align: center;
    line-height: 200px;
    margin: 10px;
    font-size: 20px;
    border-radius: 20px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
    transition: transform 0.3s ease;
  }

  .block:hover {
    transform: scale(1.1);
  }
</style>
</head>
<body>
  <div class="container">
    <input type="text" class="search-box" placeholder="Search...">
    <div class="blocks-container">
      <div class="block" id="d">DATA DASHBOARD</div>
      <div class="block" id="a">FINE TUNING</div>
      <div class="block" id="s">ABOUT US</div>
    </div>
  </div>
</body>
</html>
